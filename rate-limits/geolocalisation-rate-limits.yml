name: La Poste Geolocalisation API Rate Limits
description: Rate limiting policies for the La Poste Geolocalisation and Geolocalisation Inversee APIs on the Okapi platform.
rateLimits:
  - name: Free Tier Per-Minute Quota
    description: Okapi may limit geocoding API calls to protect against abuse. HTTP 429 is returned when the quota is exceeded.
    limit: 100
    period: minute
    scope: application key (X-Okapi-Key)
    header: X-Okapi-Key
    errorCode: 429
    errorMessage: max quota reached 100 calls per minute
  - name: Business / Contracted Quota
    description: Higher quotas available under a paid or contracted plan.
    limit: custom
    period: custom
    scope: application key
notes:
  - Rate limits apply to both forward-geocoding and reverse-geocoding endpoints using the same application key.
  - Source https://faq.developer.laposte.fr/kb/guide/fr/quelles-sont-les-limites-a-lusage-de-certaines-apis-38p1G2yLgE/Steps/2877151
