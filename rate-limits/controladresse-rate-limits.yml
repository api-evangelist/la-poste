name: La Poste ControlAdresse API Rate Limits
description: Rate limiting policies for the La Poste ControlAdresse v2 address validation API on the Okapi platform.
rateLimits:
  - name: Free Tier Per-Minute Quota
    description: The Okapi platform may limit consumption to protect APIs from abuse. HTTP 429 is returned with "max quota reached 100 calls per minute" when the limit is exceeded.
    limit: 100
    period: minute
    scope: application key (X-Okapi-Key)
    header: X-Okapi-Key
    errorCode: 429
    errorMessage: max quota reached 100 calls per minute
  - name: Business / Contracted Quota
    description: Higher quotas available under a paid business plan, defined per contract.
    limit: custom
    period: custom
    scope: application key
notes:
  - Rate limits are enforced per application key.
  - Monitor quota consumption via the real-time dashboard in the Okapi developer portal.
  - Source https://faq.developer.laposte.fr/kb/guide/fr/quelles-sont-les-limites-a-lusage-de-certaines-apis-38p1G2yLgE/Steps/2877151
