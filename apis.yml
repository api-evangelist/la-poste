name: La Poste
description: La Poste is the French national postal service, offering a developer platform called Okapi that exposes REST APIs for parcel tracking, address validation, geolocation, registered letter ordering, certified document exchange (Digiposte), and open data access (dataNOVA). APIs require an X-Okapi-Key obtained by registering a free developer account.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/la-poste/refs/heads/main/apis.yml
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
tags:
  - Postal
  - Parcel Tracking
  - Address Validation
  - Geolocation
  - Shipping
  - Open Data
  - France
apis:
  - name: La Poste Suivi (Tracking) API
    description: Harmonizes delivery status for tracked mail, Colissimo parcels, and Chronopost shipments in real time. Authenticate with an X-Okapi-Key header obtained by subscribing to the Suivi plan on the Okapi developer portal.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developer.laposte.fr/catalog-apis/suivi@latest
    baseURL: https://api.laposte.fr
    tags:
      - Parcel Tracking
      - Shipment Status
      - Colissimo
      - Chronopost
    properties:
      - type: Documentation
        url: https://developer.laposte.fr/products/suivi/latest
      - type: OpenAPI
        url: https://developer.laposte.fr/products/suivi/2/swagger
      - type: Plans
        url: https://raw.githubusercontent.com/api-evangelist/la-poste/refs/heads/main/plans/suivi-plans.yml
      - type: RateLimits
        url: https://raw.githubusercontent.com/api-evangelist/la-poste/refs/heads/main/rate-limits/suivi-rate-limits.yml
    contact:
      - FN: La Poste Developer Support
        url: https://developer.laposte.fr/
        email: ''
  - name: La Poste ControlAdresse API
    description: Validates, standardises, and enriches postal addresses for users, customers, or prospects in France. Returns CEDEX-normalised address data including street, locality, postcode, and geocoordinates.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developer.laposte.fr/catalog-apis/controladresse@2
    baseURL: https://api.laposte.fr
    tags:
      - Address Validation
      - Address Normalisation
      - CEDEX
    properties:
      - type: Documentation
        url: https://developer.laposte.fr/catalog-apis/controladresse@2
      - type: Plans
        url: https://raw.githubusercontent.com/api-evangelist/la-poste/refs/heads/main/plans/controladresse-plans.yml
      - type: RateLimits
        url: https://raw.githubusercontent.com/api-evangelist/la-poste/refs/heads/main/rate-limits/controladresse-rate-limits.yml
    contact:
      - FN: La Poste Developer Support
        url: https://developer.laposte.fr/
        email: ''
  - name: La Poste Geolocalisation API
    description: Returns GPS coordinates for a given French postal address. Enables rapid and simple address geocoding integrated via the Okapi platform.
