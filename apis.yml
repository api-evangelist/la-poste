  - name: La Poste dataNOVA Open Data API
    description: Open data portal powered by OpenDataSoft exposing 18+ datasets including postal office locations, street mailbox listings, postal codes (HEXASMAL), business registrations (SIRENE), and postal tariff tables. Supports JSON, CSV, GeoJSON, and Shapefile exports.
