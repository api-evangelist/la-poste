  - name: La Poste LReL (Lettre Recommandee en Ligne) API
    description: API for ordering online registered letters (LReL) — La Poste prints, envelopes, franks and distributes the physical letter on behalf of the requester. Uses OAuth2 authentication. Accessible via the Okapi developer platform.
