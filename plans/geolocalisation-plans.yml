name: La Poste Geolocalisation API Plans
description: Subscription plans for the La Poste Geolocalisation and Geolocalisation Inversee APIs on the Okapi developer platform.
plans:
  - name: Free
    description: Free-tier access to geocoding and reverse-geocoding of French postal addresses. Requires a free Okapi developer account and X-Okapi-Key.
    url: https://developer.laposte.fr/catalog-apis
    price: 0.00
    currency: EUR
    unit: month
    rateLimits:
      - name: Per-Minute Quota
        description: Consumption may be limited to protect against abuse. HTTP 429 is returned when quota is reached.
        limit: 100
        period: minute
    features:
      - Forward geocoding — returns GPS coordinates for a French address
      - Reverse geocoding — returns the five closest addresses from a GPS point within a configurable radius
      - Sandbox environment for testing
  - name: Paid / Business
    description: Higher-volume or SLA-backed plan. Contact La Poste via the Okapi portal for pricing and terms.
    url: https://developer.laposte.fr/catalog-apis
    price: contact
    currency: EUR
    unit: month
    features:
      - Higher request quotas
      - SLA guarantees
      - Dedicated support
